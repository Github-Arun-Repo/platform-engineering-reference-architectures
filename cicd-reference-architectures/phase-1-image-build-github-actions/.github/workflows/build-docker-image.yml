name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'cicd-reference-architectures/sample-application/**'
      - 'cicd-reference-architectures/phase-1-image-build-github-actions/**'
      - '.github/workflows/build-docker-image.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'cicd-reference-architectures/sample-application/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/todo-app
  APP_DIR: cicd-reference-architectures/sample-application

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  security_precheck:
    name: Security Precheck (Fail Fast)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION="8.24.2"
          GITLEAKS_ARCHIVE="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl --fail --location --retry 3 --retry-all-errors \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${GITLEAKS_ARCHIVE}" \
            --output "${GITLEAKS_ARCHIVE}"
          tar -xzf "${GITLEAKS_ARCHIVE}" gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run Gitleaks (Fail on detected secrets)
        run: |
          GITLEAKS_CONFIG="cicd-reference-architectures/phase-1-image-build-jenkins/gitleaks.toml"
          GITLEAKS_IGNORE="cicd-reference-architectures/phase-1-image-build-jenkins/.gitleaksignore"

          if [ -f "${GITLEAKS_IGNORE}" ]; then
            gitleaks dir . \
              --config "${GITLEAKS_CONFIG}" \
              --gitleaks-ignore-path "${GITLEAKS_IGNORE}" \
              --redact \
              --exit-code 1
          else
            gitleaks dir . \
              --config "${GITLEAKS_CONFIG}" \
              --redact \
              --exit-code 1
          fi

      - name: Run Dependency Vulnerability Check (Fail on high/critical CVEs)
        run: |
          cd ${{ env.APP_DIR }}
          mvn -B org.owasp:dependency-check-maven:check \
            -Dformat=HTML \
            -Dformat=JSON \
            -DfailBuildOnCVSS=7

      - name: Upload dependency-check reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: |
            ${{ env.APP_DIR }}/target/dependency-check-report.html
            ${{ env.APP_DIR }}/target/dependency-check-report.json
          if-no-files-found: warn

  build:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: security_precheck
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for version detection

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: latest

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test Application
        run: |
          cd ${{ env.APP_DIR }}
          mvn clean test
        
      - name: SonarQube Scan (Optional)
        if: false  # Enable by setting to 'true' and configuring secrets
        uses: SonarSource/sonarcloud-github-action@master
        with:
          projectBaseDir: ${{ env.APP_DIR }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Package Application
        run: |
          cd ${{ env.APP_DIR }}
          mvn clean package -DskipTests

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.run_number }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.APP_DIR }}
          file: ${{ env.APP_DIR }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.run_number }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Summarize Build
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Registry:** ${{ env.REGISTRY }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** ${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "✅ Image pushed to registry" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ Pull request build (image not pushed)" >> $GITHUB_STEP_SUMMARY
          fi

  deploy:
    name: Deploy to Kubernetes (Optional Next Phase)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger ArgoCD sync (Future phase)
        run: |
          echo "Next phase: Update ArgoCD repo with new image tag: ${{ needs.build.outputs.image-tag }}"
          # This will be implemented in Phase 2
          # Example:
          # - Update deployment manifests in argocd-reference-architectures/
          # - Push to main branch to trigger ArgoCD reconciliation
