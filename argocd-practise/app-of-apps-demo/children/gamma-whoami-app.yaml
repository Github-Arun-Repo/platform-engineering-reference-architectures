apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aoa-gamma-whoami
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Github-Arun-Repo/practice-labs.git
    targetRevision: main
    path: argocd-practise/apps-of-apps/gamma-whoami
  destination:
    server: https://kubernetes.default.svc
    namespace: aoa-gamma-whoami
  syncPolicy:
    automated:
      selfHeal: true
