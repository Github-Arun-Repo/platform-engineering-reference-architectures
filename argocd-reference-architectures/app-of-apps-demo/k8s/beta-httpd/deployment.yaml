apiVersion: apps/v1
kind: Deployment
metadata:
  name: beta-httpd
  namespace: aoa-beta-httpd
  labels:
    app: beta-httpd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: beta-httpd
  template:
    metadata:
      labels:
        app: beta-httpd
    spec:
      containers:
        - name: httpd
          image: httpd:xxxxxx
          ports:
            - containerPort: 80
